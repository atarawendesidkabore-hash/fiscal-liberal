version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: fiscia
      POSTGRES_PASSWORD: fiscia
      POSTGRES_DB: fiscia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscia -d fiscia"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:11434/api/version > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ollama_models:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://fiscia:fiscia@postgres:5432/fiscia
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: fiscia-fiscal-is-v3
      BILLING_CURRENCY: eur
      BILLING_LOCALE: fr
      STRIPE_RECEIPT_FOOTER_FR: Merci de votre confiance. Facturation FiscIA Pro.
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  ollama_models:
