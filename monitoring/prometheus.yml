global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "fiscia-pro"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          app: "fiscia-pro"
          env: "production"
    scrape_interval: 10s
