services:
  - type: web
    name: fiscal-liberal-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fiscia.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    buildFilter:
      paths:
        - alembic/**
        - fiscia/**
        - requirements.txt
        - alembic.ini
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: fiscal-liberal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_URL
        fromService:
          type: web
          name: fiscal-liberal-app
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: ^https://([a-z0-9-]+\.)?onrender\.com$

  - type: web
    name: fiscal-liberal-app
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npx next start --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /login
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: NODE_VERSION
        value: 22.13.1
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: fiscal-liberal-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_MARKETING_URL
        fromService:
          type: web
          name: fiscal-liberal-site
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: fiscal-liberal-site
    runtime: node
    rootDir: marketing
    buildCommand: npm ci && npm run build
    startCommand: npx next start --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    buildFilter:
      paths:
        - marketing/**
    envVars:
      - key: NODE_VERSION
        value: 22.13.1
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: fiscal-liberal-app
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: fiscal-liberal-db
    databaseName: fiscia
    user: fiscia
